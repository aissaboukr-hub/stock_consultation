workflows:
  android-workflow:
    name: Android Stock Consultation
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: jdk_17

    scripts:
      - name: Get packages then clean iOS
        script: |
          flutter config --no-enable-ios
          flutter config --no-enable-web
          flutter config --no-enable-macos
          flutter config --no-enable-linux
          flutter config --no-enable-windows
          flutter pub get
          rm -rf ios/
          rm -rf macos/ web/ linux/ windows/
          rm -f .flutter-plugins
          rm -f .flutter-plugins-dependencies

      - name: Build APK
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=1

      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=1

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - votre-email@example.com
        notify:
          success: true
          failure: true
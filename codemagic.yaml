workflows:
  android-workflow:
    name: Android Stock Consultation
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: jdk_17

    scripts:
      - name: Disable iOS platform
        script: |
          flutter config --no-enable-ios
          flutter config --no-enable-web
          flutter config --no-enable-macos
          flutter config --no-enable-linux
          flutter config --no-enable-windows

      - name: Delete iOS folder before pub get
        script: |
          rm -rf ios/

      - name: Get packages
        script: flutter pub get

      - name: Delete iOS folder after pub get
        script: |
          rm -rf ios/
          rm -f .flutter-plugins
          rm -f .flutter-plugins-dependencies

      - name: Build APK
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=1

      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=1

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab

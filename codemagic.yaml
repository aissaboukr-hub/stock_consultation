workflows:
  android-workflow:
    name: Android Stock Consultation
    instance_type: mac_mini_m2
    max_build_duration: 30

    environment:
      flutter: stable

    scripts:
      - name: Get packages
        script: |
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=1

      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=1

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
  